<!DOCTYPE html>
<html>

<head>

    <title>Change Password</title>

    <link rel="stylesheet"
          href="{{ url_for('static',
          filename='style.css') }}">

</head>

<body>

<div class="profile-container">

    <h1>Change Password</h1>

    <form method="POST">

        <input
            type="password"
            name="old_password"
            placeholder="Current Password"
            required>

        <input
            type="password"
            name="new_password"
            placeholder="New Password"
            required>

        <button type="submit">

            Update Password

        </button>

    </form>

</div>

</body>
</html>

<!DOCTYPE html>
<html>

<head>

    <title>Edit Profile</title>

    <link rel="stylesheet"
          href="{{ url_for('static',
          filename='style.css') }}">

</head>

<body>

<div class="profile-container">

    <h1>Edit Profile</h1>

    <form method="POST">

        <input
            type="text"
            name="name"
            value="{{ user.name }}"
            required>

        <input
            type="text"
            name="username"
            value="{{ user.username }}"
            required>

        <input
            type="email"
            name="email"
            value="{{ user.email }}"
            required>

        <button type="submit">

            Save Changes

        </button>

    </form>

</div>

</body>
</html>
